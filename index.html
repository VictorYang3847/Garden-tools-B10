        <div class="home-section">
          <div class="card b10-quick-card">
            <div class="card-header">
              <h3>B10 目标定义计算器</h3>
            </div>
            <div class="card-body">
              <div class="b10-calc-layout">
                <div class="b10-calc-inputs">
                  <div class="form-group">
                    <label>质保期 (年)</label>
                    <input type="number" id="home-warranty-years" class="form-input" min="0.5" max="10" step="0.5" value="2" />
                  </div>
                  <div class="form-group">
                    <label>年使用时长 (小时/年)</label>
                    <input type="number" id="home-hours-per-year" class="form-input" min="1" max="1000" step="1" value="25" />
                  </div>
                  <div class="form-group">
                    <label>允许失效率 (%)</label>
                    <input type="number" id="home-allow-fail-rate" class="form-input" min="0.1" max="10" step="0.1" value="2" />
                  </div>
                  <div class="form-group">
                    <label>形状参数 β<span class="help-icon" data-tooltip="Weibull形状参数：β>1磨损失效(典型2.0~2.5)，β=1随机失效，β<1早期失效">?</span></label>
                    <input type="number" id="home-beta" class="form-input" min="0.1" step="0.1" value="2.2" />
                  </div>
                  <div class="form-group">
                    <label>安全余量 (%)<span class="help-icon" data-tooltip="设计余量，行业常用20%~30%，考虑制造波动和使用条件变化">?</span></label>
                    <input type="number" id="home-safety-margin" class="form-input" min="0" max="50" step="5" value="20" />
                  </div>
                  <div class="form-group">
                    <label>指定时间 t (小时)<span class="help-icon" data-tooltip="查询该时刻的可靠度，例如质保总时长或设计寿命">?</span></label>
                    <input type="number" id="home-time" class="form-input" min="0" step="1" value="50" />
                  </div>
                </div>
                <div class="b10-calc-results">
                  <div class="metric-card">
                    <div class="metric-label">质保总时长 Tw</div>
                    <div class="metric-value" id="home-tw">—</div>
                    <div class="metric-unit">小时</div>
                  </div>
                  <div class="metric-card b10-highlight">
                    <div class="metric-label">目标 B10 (含余量)</div>
                    <div class="metric-value" id="home-b10">—</div>
                    <div class="metric-unit">小时</div>
                  </div>
                  <div class="metric-card">
                    <div class="metric-label">目标 B10 (不含余量)</div>
                    <div class="metric-value" id="home-b10-no-margin">—</div>
                    <div class="metric-unit">小时</div>
                  </div>
                  <div class="metric-card">
                    <div class="metric-label">所需特征寿命 η</div>
                    <div class="metric-value" id="home-eta">—</div>
                    <div class="metric-unit">小时</div>
                  </div>
                  <div class="metric-card">
                    <div class="metric-label">所需 MTBF</div>
                    <div class="metric-value" id="home-mtbf">—</div>
                    <div class="metric-unit">小时</div>
                  </div>
                  <div class="metric-card">
                    <div class="metric-label">t 时刻可靠度</div>
                    <div class="metric-value" id="home-reliability-t">—</div>
                    <div class="metric-unit">%</div>
                  </div>
                  <div class="metric-card">
                    <div class="metric-label">t 时刻失效概率</div>
                    <div class="metric-value" id="home-failure-t">—</div>
                    <div class="metric-unit">%</div>
                  </div>
                  <div class="formula-section">
                    <button type="button" class="formula-toggle" id="home-formula-toggle">📐 查看计算公式</button>
                    <div class="formula-content" id="home-formula-content" style="display: none;">
                      <div class="formula-item">
                        <h4>质保总时长</h4>
                        <div class="formula-equation">Tw = 质保年数 × 年使用时长</div>
                      </div>
                      <div class="formula-item">
                        <h4>目标 B10 寿命（含安全余量）</h4>
                        <div class="formula-equation">B10 = Tw × [ln(10/9) / -ln(1-Fw)]<sup>1/β</sup> × (1 + margin)</div>
                        <div class="formula-vars">
                          <div class="var-row"><span class="var-name">Tw</span><span class="var-desc">质保总时长（小时）</span></div>
                          <div class="var-row"><span class="var-name">Fw</span><span class="var-desc">允许失效率（如2%=0.02）</span></div>
                          <div class="var-row"><span class="var-name">β</span><span class="var-desc">形状参数</span></div>
                          <div class="var-row"><span class="var-name">margin</span><span class="var-desc">安全余量（如20%=0.2）</span></div>
                        </div>
                        <div class="formula-note">ln(10/9)≈0.10536，是B10点对应的标准常数</div>
                      </div>
                      <div class="formula-item">
                        <h4>特征寿命 η</h4>
                        <div class="formula-equation">η = B10 / [ln(10/9)]<sup>1/β</sup></div>
                      </div>
                      <div class="formula-item">
                        <h4>MTBF</h4>
                        <div class="formula-equation">MTBF = η × Γ(1 + 1/β)</div>
                      </div>
                      <div class="formula-item">
                        <h4>时刻可靠度</h4>
                        <div class="formula-equation">R(t) = exp(-(t/η)<sup>β</sup>)</div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

    <template id="life-data-template">

            <div class="life-data-tabs">
              <button type="button" class="life-data-tab active" data-tab="data-entry">数据录入</button>

              <button type="button" class="life-data-tab" data-tab="weakness">短板分析</button>
            </div>
          </div>

          <!-- Definition tab removed - product definition now handled elsewhere -->

          <div class="life-data-tab-content" id="life-tab-data-entry">
            <div class="card">
              <div class="card-header">
                <h3>试验批次管理</h3>
                <div class="card-actions">
                  <button type="button" class="btn-icon" id="ld-new-batch">
                    <span>➕</span>
                    <span class="btn-text">新建批次</span>
                  </button>
                  <button type="button" class="btn-icon" id="ld-import">
                    <span>📥</span>
                    <span class="btn-text">导入 CSV</span>
                  </button>
                  <input type="file" id="ld-import-file" accept=".csv" hidden />
                  <button type="button" class="btn-icon" id="ld-download-template">
                    <span>📄</span>
                    <span class="btn-text">下载模板</span>
                  </button>
                  <button type="button" class="btn-icon btn-danger" id="ld-batch-delete">
                    <span>🗑️</span>
                    <span class="btn-text">删除批次</span>
                  </button>

                    <div class="formula-item">
                      <h4>威布尔可靠度公式</h4>
                      <div class="formula-equation">R(t) = exp(-(t/η)<sup>β</sup>)</div>
                      <div class="formula-vars">
                        <div class="var-row"><span class="var-name">R(t)</span><span class="var-desc">时刻 t 的可靠度</span></div>
                        <div class="var-row"><span class="var-name">t</span><span class="var-desc">时间（小时）</span></div>
                        <div class="var-row"><span class="var-name">η</span><span class="var-desc">特征寿命（尺度参数）</span></div>
                        <div class="var-row"><span class="var-name">β</span><span class="var-desc">形状参数</span></div>
                      </div>
                    </div>
                    <div class="formula-item">
                      <h4>B10 寿命公式</h4>
                      <div class="formula-equation">B10 = η × [-ln(0.9)]<sup>1/β</sup></div>
                      <div class="formula-note">可靠度为90%时对应的寿命，即10%产品失效的时间</div>
                    </div>
                    <div class="formula-item">
                      <h4>MTBF 公式</h4>
                      <div class="formula-equation">MTBF = η × Γ(1 + 1/β)</div>
                      <div class="formula-note">平均失效前时间，Γ为伽马函数</div>
                    </div>
                    <div class="formula-item">
                      <h4>失效率公式</h4>
                      <div class="formula-equation">h(t) = (β/η) × (t/η)<sup>β-1</sup></div>
                    </div>
                  </div>
                </div>
              </div>

          <div class="test-plan-tab-content" id="tp-tab-sample-analysis">
            <div class="card">
              <div class="card-header">
                <h3>样本量分析</h3>
                <span class="tp-optimize-hint">制定测试计划前的前置分析工具</span>
              </div>
              <div class="card-body">
                <div class="sample-analysis-tabs">
                  <button type="button" class="sample-analysis-tab active" data-tab="qualification">合格性验证</button>
                  <button type="button" class="sample-analysis-tab" data-tab="life-test">寿命测定</button>
                </div>

                <div class="sample-analysis-tab-content" id="tp-sa-tab-qualification">
                  <div class="form-row">
                    <div class="form-group">
                      <label>目标可靠度 R<span class="help-icon" data-tooltip="产品在目标寿命时刻的可靠度">?</span></label>
                      <input type="number" id="tp-sa-reliability" class="form-input" min="50" max="99.9" step="0.1" value="90" />

                      <input type="number" id="tp-sa-confidence" class="form-input" min="50" max="99.9" step="0.1" value="90" />
                    </div>
                    <div class="form-group">
                      <label>允许失效数 r<span class="help-icon" data-tooltip="试验中允许的最大失效数">?</span></label>
                      <input type="number" id="tp-sa-allowed" class="form-input" min="0" max="20" step="1" value="0" />
                    </div>
                  </div>
                  <div class="result-card">
                    <div class="result-row">
                      <span class="result-label">所需样本量 n</span>
                      <span class="result-value" id="tp-sa-qual-n">-</span>
                    </div>
                    <div class="result-row">
                      <span class="result-label">通过概率（零失效）</span>
                      <span class="result-value" id="tp-sa-qual-pass">-</span>
                    </div>
                  </div>
                  <div class="formula-section">
                    <button type="button" id="tp-sa-qual-formula-toggle" class="btn-link">📐 查看计算公式</button>
                    <div id="tp-sa-qual-formula-content" style="display: none; margin-top: 8px; padding: 8px; background: var(--surface-2); border-radius: var(--radius); font-size: 0.85rem;">
                      <p><strong>二项分布样本量公式：</strong></p>
                      <p>P(≤r失效 | n,R) ≤ 1-γ</p>
                      <p>当 r=0 时：n = ceil(ln(1-γ) / ln(R))</p>
                      <p>当 r>0 时：搜索最小 n 满足 Σ(k=0 to r) C(n,k)p^k(1-p)^(n-k) ≤ 1-γ</p>
                    </div>
                  </div>
                </div>

                      <input type="number" id="tp-sa-beta" class="form-input" min="0.5" max="5" step="0.1" value="2.2" />
                    </div>
                    <div class="form-group">

                      <input type="number" id="tp-sa-life-confidence" class="form-input" min="50" max="99.9" step="0.1" value="90" />

                    <div class="form-group">

                    </div>
                    <div class="form-group">
                      <label>试验时间倍率<span class="help-icon" data-tooltip="试验时间 / B10，越大样本量越少">?</span></label>
                      <input type="number" id="tp-sa-multiplier" class="form-input" min="0.5" max="5" step="0.1" value="1.0" />

                    <div class="result-row">
                      <span class="result-label">总台时</span>
                      <span class="result-value" id="tp-sa-life-total">-</span>
                    </div>
                  </div>
                  <div class="form-row">
                    <div class="form-group" style="flex: 1;">

                        <thead>

                            <th>总台时</th>

                    </div>
                  </div>
                  <div class="formula-section">
                    <button type="button" id="tp-sa-life-formula-toggle" class="btn-link">📐 查看计算公式</button>
                    <div id="tp-sa-life-formula-content" style="display: none; margin-top: 8px; padding: 8px; background: var(--surface-2); border-radius: var(--radius); font-size: 0.85rem;">
                      <p><strong>Weibull 折算样本量公式：</strong></p>
                      <p>K10 = ln(10/9) ≈ 0.10536</p>
                      <p>R_test = exp(-K10 × (T/B10)^β)</p>
                      <p>n = binomialSampleSize(R_test, γ, r)</p>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="sample-size-tab-content" id="ss-tab-qualification">
            <div class="sample-size-layout">
              <div class="sample-size-inputs card">
                <div class="card-header">
                  <h3>输入参数（二项分布）</h3>
                </div>
                <div class="card-body">
                  <div class="form-group">
                    <label>目标可靠度 R<span class="help-icon" data-tooltip="要求达到的可靠度水平，如90%表示90%的产品能通过">?</span></label>
                    <div class="slider-row">
                      <input type="range" id="ss-qual-reliability-slider" class="slider-input" min="50" max="99" value="90" />
                      <input type="number" id="ss-qual-reliability-value" class="form-input reliability-number" min="50" max="99" step="1" value="90" />
                      <span class="slider-unit">%</span>
                    </div>
                  </div>
                  <div class="form-group">
                    <label>置信度 CL<span class="help-icon" data-tooltip="统计结论的把握程度，越高需要的样本量越大">?</span></label>
                    <div class="slider-row">
                      <input type="range" id="ss-qual-confidence-slider" class="slider-input" min="50" max="99" value="90" />
                      <input type="number" id="ss-qual-confidence-value" class="form-input reliability-number" min="50" max="99" step="1" value="90" />
                      <span class="slider-unit">%</span>
                    </div>
                  </div>
                  <div class="form-group">
                    <label>允许失效数 r<span class="help-icon" data-tooltip="试验中允许的失效数量，0失效要求最严格">?</span></label>
                    <input type="number" id="ss-qual-allowed-failures" class="form-input" min="0" max="10" step="1" value="0" />
                  </div>
                  <div class="form-group">
                    <label>试验时长 t <span class="hint">(小时)</span></label>
                    <input type="number" id="ss-qual-test-time" class="form-input" min="1" step="1" value="200" />
                  </div>
                  <div class="form-group">
                    <label>威布尔形状参数 β</label>
                    <input type="number" id="ss-qual-beta" class="form-input" min="0.1" step="0.1" value="2.2" />
                  </div>
                </div>
              </div>

              <div class="sample-size-results">
                <div class="metric-card ss-result-highlight">
                  <div class="metric-label">最少样本量 n</div>
                  <div class="metric-value" id="ss-qual-result-n">—</div>
                  <div class="metric-unit">台</div>
                </div>
                <div class="card">
                  <div class="card-header">
                    <h3>结果说明</h3>
                  </div>
                  <div class="card-body">
                    <div class="ss-result-info" id="ss-qual-zero-fail-prob">
                      <strong>0失效通过概率：</strong><span id="ss-qual-pass-prob">—</span>
                    </div>
                    <div class="ss-result-divider"></div>
                    <div class="ss-result-reference">
                      <h4>行业参考</h4>
                      <ul>
                        <li>部件级：6 ~ 8 台</li>
                        <li>整机级：10 ~ 20 台</li>
                      </ul>
                    </div>
                    <div class="formula-section">
                      <button type="button" class="formula-toggle" id="ss-qual-formula-toggle">📐 查看计算公式</button>
                      <div class="formula-content" id="ss-qual-formula-content" style="display: none;">
                        <div class="formula-item">
                          <h4>0失效时样本量公式</h4>
                          <div class="formula-equation">n = ln(1 - CL) / ln(R)</div>
                          <div class="formula-vars">
                            <div class="var-row"><span class="var-name">n</span><span class="var-desc">最少样本量</span></div>
                            <div class="var-row"><span class="var-name">CL</span><span class="var-desc">置信度（Confidence Level）</span></div>
                            <div class="var-row"><span class="var-name">R</span><span class="var-desc">目标可靠度</span></div>
                          </div>
                        </div>
                        <div class="formula-item">
                          <h4>二项分布累积概率</h4>
                          <div class="formula-equation">P(X ≤ r) = Σ<sub>k=0</sub><sup>r</sup> C(n,k) × (1-R)<sup>k</sup> × R<sup>n-k</sup></div>
                          <div class="formula-note">n个样本中失效数不超过r的概率</div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="sample-size-tab-content" id="ss-tab-life-test" style="display: none;">

                  <div class="form-group">
                    <label>目标精度（相对误差）<span class="help-icon" data-tooltip="B10估计值的相对误差要求，如20%表示误差不超过±20%">?</span></label>
                    <div class="slider-row">
                      <input type="range" id="ss-life-precision-slider" class="slider-input" min="5" max="50" value="20" />
                      <input type="number" id="ss-life-precision-value" class="form-input reliability-number" min="5" max="50" step="1" value="20" />
                      <span class="slider-unit">%</span>
                    </div>
                  </div>
                  <div class="form-group">
                    <label>置信度 CL<span class="help-icon" data-tooltip="统计结论的把握程度，越高需要的样本量越大">?</span></label>
                    <div class="slider-row">
                      <input type="range" id="ss-life-confidence-slider" class="slider-input" min="50" max="99" value="90" />
                      <input type="number" id="ss-life-confidence-value" class="form-input reliability-number" min="50" max="99" step="1" value="90" />
                      <span class="slider-unit">%</span>
                    </div>
                  </div>
                  <div class="form-group">
                    <label>预期失效比例<span class="help-icon" data-tooltip="试验结束时预计的失效比例，越高需要的总样本量越少">?</span></label>
                    <div class="slider-row">
                      <input type="range" id="ss-life-failure-ratio-slider" class="slider-input" min="30" max="100" value="60" />
                      <input type="number" id="ss-life-failure-ratio-value" class="form-input reliability-number" min="30" max="100" step="1" value="60" />
                      <span class="slider-unit">%</span>
                    </div>
                  </div>
                  <div class="form-group">
                    <label>威布尔形状参数 β</label>
                    <input type="number" id="ss-life-beta" class="form-input" min="0.1" step="0.1" value="2.2" />
                  </div>
                </div>
              </div>

              <div class="sample-size-results">
                <div class="metric-card ss-result-highlight">
                  <div class="metric-label">推荐样本量</div>
                  <div class="metric-value" id="ss-life-result-n">—</div>
                  <div class="metric-unit">台</div>
                </div>
                <div class="card">
                  <div class="card-header">
                    <h3>结果说明</h3>
                  </div>
                  <div class="card-body">
                    <div class="ss-result-info">
                      <strong>预期失效数：</strong><span id="ss-life-failure-count">—</span> 台
                    </div>
                    <div class="ss-result-divider"></div>
                    <div class="ss-result-note">
                      <p>基于统计精度近似公式估算，实际样本量可根据试验条件适当调整。</p>
                      <p class="hint">预期失效比例越高，所需总样本量越少，但试验周期相应延长。</p>
                    </div>
                    <div class="formula-section">
                      <button type="button" class="formula-toggle" id="ss-life-formula-toggle">📐 查看计算公式</button>
                      <div class="formula-content" id="ss-life-formula-content" style="display: none;">
                        <div class="formula-item">
                          <h4>所需失效数近似公式</h4>
                          <div class="formula-equation">r ≈ (z<sub>α</sub> / δ)² / 2</div>
                          <div class="formula-vars">
                            <div class="var-row"><span class="var-name">r</span><span class="var-desc">所需失效数</span></div>
                            <div class="var-row"><span class="var-name">z<sub>α</sub></span><span class="var-desc">标准正态分布分位数（90%置信→1.645）</span></div>
                            <div class="var-row"><span class="var-name">δ</span><span class="var-desc">目标相对精度（如20%即0.2）</span></div>
                          </div>
                        </div>
                        <div class="formula-item">
                          <h4>总样本量</h4>
                          <div class="formula-equation">n = r / p</div>
                          <div class="formula-note">p为预期失效比例</div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

                      <div class="form-group">
                        <label>起始频率 (Hz)</label>
                        <input type="number" name="freqStart" class="form-input" min="0.1" step="0.1" />
                      </div>
                      <div class="form-group">
                        <label>终止频率 (Hz)</label>
                        <input type="number" name="freqEnd" class="form-input" min="0.1" step="0.1" />
                      </div>
                    </div>
                    <div class="form-row">
                      <div class="form-group">
                        <label>加速度幅值 (g)</label>
                        <input type="number" name="amplitude" class="form-input" min="0.1" step="0.1" />
                      </div>
                      <div class="form-group">
                        <label>振动方向</label>
                        <select name="direction" class="form-input">
                          <option value="x">X 轴</option>
                          <option value="y">Y 轴</option>
                          <option value="z">Z 轴</option>
                        </select>
                      </div>
                    </div>
                    <div class="form-row">
                      <div class="form-group">
                        <label>持续时间 (min)</label>
                        <input type="number" name="duration" class="form-input" min="0" step="1" />
                      </div>
                    </div>
                  </form>
                </div>
              </div>

              <div class="card" id="env-random-card" style="display: none;">
                <div class="card-header">
                  <h3>随机振动参数</h3>
                </div>
                <div class="card-body">
                  <form id="env-random-form">
                    <div class="form-row">
                      <div class="form-group">
                        <label>起始频率 (Hz)</label>
                        <input type="number" name="freqStart" class="form-input" min="0.1" step="0.1" />
                      </div>
                      <div class="form-group">
                        <label>终止频率 (Hz)</label>
                        <input type="number" name="freqEnd" class="form-input" min="0.1" step="0.1" />
                      </div>
                    </div>
                    <div class="form-row">
                      <div class="form-group">
                        <label>PSD 谱密度 (g²/Hz)</label>
                        <input type="number" name="psd" class="form-input" min="0.001" step="0.001" />
                      </div>
                      <div class="form-group">
                        <label>持续时间 (min)</label>
                        <input type="number" name="duration" class="form-input" min="0" step="1" />
                      </div>
                    </div>
                  </form>
                </div>
              </div>

              <div class="card">
                <div class="card-header">
                  <h3>分析结果</h3>
                </div>
                <div class="card-body">
                  <div class="metrics-grid">
                    <div class="metric-card">
                      <div class="metric-label">Grms (随机振动)</div>
                      <div class="metric-value" id="env-grms">—</div>
                      <div class="metric-unit">g</div>
                    </div>
                    <div class="metric-card">
                      <div class="metric-label">振动应力水平</div>
                      <div class="metric-value" id="env-stress-level">—</div>
                    </div>
                    <div class="metric-card">
                      <div class="metric-label">疲劳损伤估算</div>
                      <div class="metric-value" id="env-fatigue-damage">—</div>
                    </div>
                    <div class="metric-card">
                      <div class="metric-label">建议试验等级</div>
                      <div class="metric-value" id="env-suggested-level">—</div>
                    </div>
                  </div>
                  <div class="action-row">
                    <button type="button" class="btn-primary" id="env-vib-calc">计算</button>
                    <button type="button" class="btn-ghost" id="env-vib-reset">重置</button>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="env-tab-content" id="env-tab-env-mapping" style="display: none;">
            <div class="card">
              <div class="card-header">
                <h3>环境应力映射表</h3>
                <div class="card-actions">
                  <span class="selector-label" style="font-size: 0.8rem; color: var(--text-muted);">共 <span id="env-stress-count">0</span> 种应力</span>
                </div>
              </div>
              <div class="card-body" style="padding: 0;">
                <div class="env-table-container table-wrap">
                  <table class="data-table env-stress-table">
                    <thead>
                      <tr>
                        <th style="width: 60px;">序号</th>
                        <th style="min-width: 100px;">应力类型</th>
                        <th style="min-width: 140px;">使用环境等级</th>
                        <th style="width: 100px;">环境因子 π_E</th>
                        <th style="min-width: 180px;">试验标准参考</th>
                        <th style="min-width: 180px;">备注</th>
                      </tr>
                    </thead>
                    <tbody id="env-stress-tbody"></tbody>
                  </table>
                </div>
              </div>
            </div>

            <div class="card">
              <div class="card-header">
                <h3>环境因子说明 (π_E)</h3>
              </div>
              <div class="card-body">
                <div class="env-factor-grid">
                  <div class="env-factor-item">
                    <div class="factor-name">地面良好 (Ground Benign)</div>
                    <div class="factor-value">π_E = 1.0</div>
                    <div class="factor-desc">受控环境，温度稳定，无振动</div>
                  </div>
                  <div class="env-factor-item">
                    <div class="factor-name">地面固定 (Ground Fixed)</div>
                    <div class="factor-value">π_E = 1.5</div>
                    <div class="factor-desc">固定安装，有一定温湿度变化</div>
                  </div>
                  <div class="env-factor-item">
                    <div class="factor-name">地面移动 (Ground Mobile)</div>
                    <div class="factor-value">π_E = 3.0</div>
                    <div class="factor-desc">车载设备，振动和温度变化较大</div>
                  </div>
                  <div class="env-factor-item">
                    <div class="factor-name">户外 (Outdoor)</div>
                    <div class="factor-value">π_E = 4.0</div>
                    <div class="factor-desc">直接暴露于自然环境</div>
                  </div>
                  <div class="env-factor-item">
                    <div class="factor-name">舰载 (Naval)</div>
                    <div class="factor-value">π_E = 5.0</div>
                    <div class="factor-desc">海上环境，盐雾、湿度、摇摆</div>
                  </div>
                  <div class="env-factor-item">
                    <div class="factor-name">机载 (Airborne)</div>
                    <div class="factor-value">π_E = 7.0</div>
                    <div class="factor-desc">航空环境，温度、压力、振动变化剧烈</div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="env-tab-content" id="env-tab-standards" style="display: none;">
            <div class="card">
              <div class="card-header">
                <h3>试验标准库</h3>
                <div class="card-actions">
                  <div class="standards-filter">
                    <select id="env-standard-category" class="form-input" style="width: 160px;">
                      <option value="all">全部分类</option>
                      <option value="IEC 60068">IEC 60068 系列</option>
                      <option value="GJB 150">GJB 150 系列</option>
                      <option value="MIL-STD-810">MIL-STD-810</option>
                      <option value="GB/T 2423">GB/T 2423</option>
                    </select>
                    <input type="text" id="env-standard-search" class="form-input" placeholder="搜索标准编号或名称..." style="width: 220px;" />
                  </div>
                </div>
              </div>
              <div class="card-body" style="padding: 0;">
                <div class="standards-table-container table-wrap">
                  <table class="data-table standards-table">
                    <thead>
                      <tr>
                        <th style="width: 50px;">序号</th>
                        <th style="min-width: 180px;">标准编号</th>
                        <th style="min-width: 180px;">标准名称</th>
                        <th style="width: 130px;">标准分类</th>
                        <th style="min-width: 180px;">适用范围</th>
                        <th style="min-width: 200px;">常用试验项目</th>
                      </tr>
                    </thead>
                    <tbody id="env-standards-tbody"></tbody>
                  </table>
                  <div class="empty-state" id="env-standards-empty" style="display: none;">
                    <div class="empty-icon">📋</div>
                    <h3>未找到匹配的标准</h3>
                    <p>请尝试其他搜索关键词或分类筛选。</p>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </template>

    <!-- 登录/注册弹窗 -->
    <div class="auth-modal-overlay" id="auth-modal" hidden>
      <div class="auth-modal-panel">
        <div class="auth-modal-header">
          <div class="auth-tabs">
            <button type="button" class="auth-tab active" data-tab="login">登录</button>
            <button type="button" class="auth-tab" data-tab="register">注册</button>
          </div>
          <button type="button" class="auth-modal-close" id="auth-close" aria-label="关闭">×</button>
        </div>
        <form id="auth-form" class="auth-form">
          <input type="email" id="auth-email" placeholder="邮箱" required autocomplete="email" />
          <input type="password" id="auth-password" placeholder="密码（至少 6 位）" required minlength="6" autocomplete="current-password" />
          <input type="password" id="auth-password-confirm" placeholder="确认密码" hidden autocomplete="new-password" />
          <button type="submit" id="auth-submit" class="btn-primary auth-submit-btn">登录</button>
          <div class="auth-error" id="auth-error" hidden></div>
        </form>
        <div class="auth-modal-footer">
          <span class="auth-hint">登录后可跨设备同步数据；未登录时仅本地存储</span>
        </div>
      </div>
    </div>

    <script type="module" src="js/app.js?v=1.4.2"></script>
  </body>
</html>
