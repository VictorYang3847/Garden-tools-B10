    <!-- 登录/注册弹窗 -->

            <button type="button" class="auth-tab" data-tab="register">注册</button>

          <input type="email" id="auth-email" placeholder="邮箱" required autocomplete="email" />
          <input type="password" id="auth-password" placeholder="密码（至少 6 位）" required minlength="6" autocomplete="current-password" />
          <input type="password" id="auth-password-confirm" placeholder="确认密码" hidden autocomplete="new-password" />
          <button type="submit" id="auth-submit" class="btn-primary auth-submit-btn">登录</button>
          <div class="auth-error" id="auth-error" hidden></div>
        </form>
        <div class="auth-modal-footer">
          <span class="auth-hint">登录后可跨设备同步数据；未登录时仅本地存储</span>
