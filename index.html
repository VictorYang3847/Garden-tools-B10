<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>可靠性工具平台</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="app-layout">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-logo">
            <span class="logo-icon">⚙️</span>
            <span class="logo-text">可靠性工具</span>
          </div>
        </div>
        <nav class="sidebar-nav">
          <a href="#/fmea" class="nav-item" data-route="fmea">
            <span class="nav-icon">🔍</span>
            <span class="nav-label">FMEA</span>
          </a>
          <a href="#/prediction" class="nav-item" data-route="prediction">
            <span class="nav-icon">📊</span>
            <span class="nav-label">可靠性预测</span>
          </a>
          <a href="#/life-data" class="nav-item" data-route="life-data">
            <span class="nav-icon">📈</span>
            <span class="nav-label">寿命数据分析</span>
          </a>
          <a href="#/test-plan" class="nav-item" data-route="test-plan">
            <span class="nav-icon">📋</span>
            <span class="nav-label">测试计划</span>
          </a>
          <a href="#/fta" class="nav-item" data-route="fta">
            <span class="nav-icon">🌳</span>
            <span class="nav-label">故障树分析</span>
          </a>
          <a href="#/growth" class="nav-item" data-route="growth">
            <span class="nav-icon">📈</span>
            <span class="nav-label">可靠性增长</span>
          </a>
          <a href="#/maintenance" class="nav-item" data-route="maintenance">
            <span class="nav-icon">🔧</span>
            <span class="nav-label">维护可用性</span>
          </a>
          <a href="#/derating" class="nav-item" data-route="derating">
            <span class="nav-icon">📉</span>
            <span class="nav-label">降额裕度</span>
          </a>
          <a href="#/environment" class="nav-item" data-route="environment">
            <span class="nav-icon">🌡️</span>
            <span class="nav-label">环境适应</span>
          </a>
          <a href="#/data" class="nav-item" data-route="data">
            <span class="nav-icon">💾</span>
            <span class="nav-label">数据管理</span>
          </a>
        </nav>
        <div class="sidebar-footer">
          <span class="version-text">v1.0.0</span>
        </div>
      </aside>

      <div class="main-wrapper">
        <header class="header">
          <div class="header-left">
            <button type="button" class="sidebar-toggle" id="sidebar-toggle" aria-label="切换侧边栏">
              <span class="hamburger"></span>
            </button>
            <div class="header-title">
              <h1 id="page-title">可靠性工具平台</h1>
            </div>
          </div>
          <div class="header-right">
            <div class="header-selectors">
              <label class="selector-group">
                <span class="selector-label">项目</span>
                <select id="project-select" class="header-select"></select>
              </label>
              <label class="selector-group">
                <span class="selector-label">产品</span>
                <select id="product-select" class="header-select"></select>
              </label>
              <label class="selector-group">
                <span class="selector-label">型号</span>
                <select id="model-select" class="header-select"></select>
              </label>
            </div>
            <div class="header-actions">
              <button type="button" id="import-btn" class="btn-icon" title="导入">
                <span>📥</span>
                <span class="btn-text">导入</span>
              </button>
              <button type="button" id="export-btn" class="btn-icon" title="导出">
                <span>📤</span>
                <span class="btn-text">导出</span>
              </button>
              <input type="file" id="import-file" accept=".json" hidden />
            </div>
          </div>
        </header>

        <main class="main-content" id="main-content">
        </main>
      </div>
    </div>

    <template id="fmea-template">
      <div class="module-page fmea-page">
        <div class="module-header">
          <h2>FMEA</h2>
          <p>失效模式与影响分析（Failure Mode and Effects Analysis）</p>
        </div>
        <div class="module-content">
          <div class="fmea-toolbar">
            <div class="fmea-tabs">
              <button type="button" class="fmea-tab active" data-type="DFMEA">DFMEA</button>
              <button type="button" class="fmea-tab" data-type="PFMEA">PFMEA</button>
            </div>
            <div class="fmea-toolbar-right">
              <div class="fmea-filter">
                <label class="filter-label">AP 筛选</label>
                <select class="fmea-filter-select" id="fmea-ap-filter">
                  <option value="all">全部</option>
                  <option value="H">H - 高</option>
                  <option value="M">M - 中</option>
                  <option value="L">L - 低</option>
                </select>
              </div>
              <button type="button" class="btn-icon" id="fmea-add-row">
                <span>➕</span>
                <span class="btn-text">添加行</span>
              </button>
              <button type="button" class="btn-icon" id="fmea-export-csv">
                <span>📤</span>
                <span class="btn-text">导出 CSV</span>
              </button>
            </div>
          </div>
          <div class="fmea-table-container table-wrap">
            <table class="data-table fmea-table">
              <thead>
                <tr>
                  <th style="width: 50px;">序号</th>
                  <th style="min-width: 180px;">功能/过程要求</th>
                  <th style="min-width: 180px;">失效模式</th>
                  <th style="min-width: 180px;">失效后果</th>
                  <th style="width: 70px;">严重度 (S)</th>
                  <th style="min-width: 180px;">失效原因</th>
                  <th style="width: 70px;">发生度 (O)</th>
                  <th style="min-width: 150px;">现行控制 - 预防</th>
                  <th style="min-width: 150px;">现行控制 - 探测</th>
                  <th style="width: 70px;">探测度 (D)</th>
                  <th style="width: 70px;">RPN</th>
                  <th style="width: 70px;">AP</th>
                  <th style="min-width: 180px;">建议措施</th>
                  <th style="min-width: 120px;">责任部门/人</th>
                  <th style="width: 120px;">目标完成日期</th>
                  <th style="width: 90px;">措施结果 - S(新)</th>
                  <th style="width: 90px;">措施结果 - O(新)</th>
                  <th style="width: 90px;">措施结果 - D(新)</th>
                  <th style="width: 80px;">RPN(新)</th>
                  <th style="width: 70px;">AP(新)</th>
                  <th style="width: 70px;">操作</th>
                </tr>
              </thead>
              <tbody id="fmea-table-body">
              </tbody>
            </table>
            <div class="fmea-empty-state empty-state" id="fmea-empty-state" style="display: none;">
              <div class="empty-icon">📋</div>
              <h3>暂无 FMEA 数据</h3>
              <p>点击「添加行」按钮开始创建您的第一个 FMEA 条目。</p>
              <button type="button" class="btn-primary" id="fmea-empty-add-btn">添加第一行</button>
            </div>
          </div>
        </div>
      </div>
    </template>

    <template id="life-data-template">
      <div class="module-page life-data-page">
        <div class="module-header">
          <h2>寿命数据分析</h2>
          <p>基于 Weibull、指数分布、对数正态分布的寿命数据分析与 B10 寿命计算</p>
        </div>
        <div class="module-content">
          <div class="life-data-toolbar">
            <div class="life-data-tabs">
              <button type="button" class="life-data-tab active" data-tab="definition">产品定义</button>
              <button type="button" class="life-data-tab" data-tab="data-entry">数据录入</button>
              <button type="button" class="life-data-tab" data-tab="analysis">分析结果</button>
            </div>
          </div>

          <div class="life-data-tab-content" id="life-tab-definition">
            <div class="card-grid">
              <div class="card">
                <div class="card-header">
                  <h3>产品信息</h3>
                </div>
                <div class="card-body">
                  <form id="ld-definition-form">
                    <div class="form-row">
                      <div class="form-group">
                        <label>型号名称</label>
                        <input type="text" name="modelName" class="form-input" />
                      </div>
                      <div class="form-group">
                        <label>项目编号</label>
                        <input type="text" name="projectCode" class="form-input" />
                      </div>
                    </div>
                    <div class="form-row">
                      <div class="form-group">
                        <label>电压 (V)</label>
                        <input type="number" name="voltage" class="form-input" min="0" step="0.1" />
                      </div>
                      <div class="form-group">
                        <label>功率 (W)</label>
                        <input type="number" name="power" class="form-input" min="0" step="1" />
                      </div>
                    </div>
                    <div class="form-row">
                      <div class="form-group">
                        <label>刀片类型</label>
                        <select name="bladeType" class="form-input">
                          <option value="double">双刃</option>
                          <option value="single">单刃</option>
                          <option value="reciprocating">往复式</option>
                        </select>
                      </div>
                      <div class="form-group">
                        <label>刀片长度 (mm)</label>
                        <input type="number" name="bladeLength" class="form-input" min="0" step="1" />
                      </div>
                    </div>
                    <div class="form-row">
                      <div class="form-group">
                        <label>每分钟行程次数</label>
                        <input type="number" name="strokeRate" class="form-input" min="0" step="1" />
                      </div>
                      <div class="form-group">
                        <label>分析人员</label>
                        <input type="text" name="analyst" class="form-input" />
                      </div>
                    </div>
                    <div class="form-row">
                      <div class="form-group full-width">
                        <label>备注</label>
                        <textarea name="note" class="form-input" rows="2"></textarea>
                      </div>
                    </div>
                  </form>
                </div>
              </div>

              <div class="card">
                <div class="card-header">
                  <h3>使用场景</h3>
                </div>
                <div class="card-body">
                  <form id="ld-scenario-form">
                    <div class="form-row">
                      <div class="form-group">
                        <label>场景名称</label>
                        <input type="text" name="scenarioName" class="form-input" />
                      </div>
                      <div class="form-group">
                        <label>年使用小时数</label>
                        <input type="number" name="hoursPerYear" class="form-input" min="0" step="1" />
                      </div>
                    </div>
                    <div class="form-row">
                      <div class="form-group">
                        <label>占空比 (%)</label>
                        <input type="number" name="dutyCycle" class="form-input" min="0" max="100" step="1" />
                      </div>
                      <div class="form-group">
                        <label>连续运行时间 (分钟)</label>
                        <input type="number" name="continuousRunMin" class="form-input" min="0" step="1" />
                      </div>
                    </div>
                    <div class="form-row">
                      <div class="form-group">
                        <label>保修年限</label>
                        <input type="number" name="warrantyYears" class="form-input" min="0" step="0.5" />
                      </div>
                      <div class="form-group">
                        <label>可接受失效率 (%)</label>
                        <input type="number" name="acceptableFailureRate" class="form-input" min="0" max="100" step="0.1" />
                      </div>
                    </div>
                    <div class="form-row">
                      <div class="form-group">
                        <label>置信度 (%)</label>
                        <select name="confidence" class="form-input">
                          <option value="90">90%</option>
                          <option value="95">95%</option>
                          <option value="99">99%</option>
                        </select>
                      </div>
                      <div class="form-group">
                        <label>安全余量 (%)</label>
                        <input type="number" name="safetyMargin" class="form-input" min="0" max="100" step="1" />
                      </div>
                    </div>
                    <div class="form-row">
                      <div class="form-group">
                        <label>失效定义</label>
                        <select name="failureDefinition" class="form-input">
                          <option value="performance">性能衰减</option>
                          <option value="functional">功能失效</option>
                          <option value="safety">安全失效</option>
                        </select>
                      </div>
                      <div class="form-group">
                        <label>性能阈值 (%)</label>
                        <input type="number" name="performanceThreshold" class="form-input" min="0" max="100" step="1" />
                      </div>
                    </div>
                    <div class="form-row">
                      <div class="form-group full-width">
                        <label>Weibull 形状参数 β</label>
                        <input type="number" name="beta" class="form-input" min="0.1" step="0.1" />
                      </div>
                    </div>
                    <div class="form-row">
                      <div class="form-group full-width">
                        <label>场景备注</label>
                        <textarea name="scenarioNote" class="form-input" rows="2"></textarea>
                      </div>
                    </div>
                    <div class="hint">保修累计小时数：<span id="ld-warranty-hours">0</span> h</div>
                  </form>
                </div>
              </div>
            </div>

            <div class="card">
              <div class="card-header">
                <h3>零件 B10 寿命</h3>
              </div>
              <div class="card-body">
                <div class="parts-table-container">
                  <table class="data-table parts-table">
                    <thead>
                      <tr>
                        <th style="width: 40px;">包含</th>
                        <th>零件</th>
                        <th style="width: 150px;">B10 寿命</th>
                        <th style="width: 150px;">单位</th>
                        <th style="min-width: 180px;">参数</th>
                      </tr>
                    </thead>
                    <tbody id="ld-parts-tbody">
                    </tbody>
                  </table>
                </div>
                <div class="hint" id="ld-battery-equiv" style="margin-top: 0.5rem;">电池等效寿命：— h</div>
              </div>
            </div>

            <div class="card" id="ld-def-results-card" style="display: none;">
              <div class="card-header">
                <h3>计算结果</h3>
              </div>
              <div class="card-body">
                <div class="metrics-grid">
                  <div class="metric-card">
                    <div class="metric-label">目标 B10（含余量）</div>
                    <div class="metric-value" id="ld-result-target-b10">—</div>
                    <div class="metric-unit">h</div>
                  </div>
                  <div class="metric-card">
                    <div class="metric-label">零件合成 B10</div>
                    <div class="metric-value" id="ld-result-parts-b10">—</div>
                    <div class="metric-unit">h</div>
                  </div>
                  <div class="metric-card">
                    <div class="metric-label">瓶颈零件</div>
                    <div class="metric-value" id="ld-result-bottleneck">—</div>
                  </div>
                  <div class="metric-card">
                    <div class="metric-label">差距</div>
                    <div class="metric-value" id="ld-result-gap">—</div>
                    <div class="metric-unit">h</div>
                  </div>
                </div>
                <div class="status-banner" id="ld-status-banner"></div>
                <div class="chart-section">
                  <h4>B10 寿命对比</h4>
                  <div class="chart-container" id="ld-chart-bars"></div>
                </div>
                <div class="action-row">
                  <button type="button" class="btn-primary" id="ld-def-calculate">计算</button>
                  <button type="button" class="btn-secondary" id="ld-def-save">保存</button>
                  <button type="button" class="btn-ghost" id="ld-def-reset">重置</button>
                  <button type="button" class="btn-ghost" id="ld-copy-summary">复制摘要</button>
                </div>
              </div>
            </div>

            <div class="action-row" id="ld-def-no-results">
              <button type="button" class="btn-primary" id="ld-def-calculate-first">开始计算</button>
            </div>
          </div>

          <div class="life-data-tab-content" id="life-tab-data-entry" style="display: none;">
            <div class="card">
              <div class="card-header">
                <h3>试验批次管理</h3>
                <div class="card-actions">
                  <button type="button" class="btn-icon" id="ld-new-batch">
                    <span>➕</span>
                    <span class="btn-text">新建批次</span>
                  </button>
                  <button type="button" class="btn-icon" id="ld-import">
                    <span>📥</span>
                    <span class="btn-text">导入 CSV</span>
                  </button>
                  <input type="file" id="ld-import-file" accept=".csv" hidden />
                  <button type="button" class="btn-icon" id="ld-download-template">
                    <span>📄</span>
                    <span class="btn-text">下载模板</span>
                  </button>
                  <button type="button" class="btn-icon btn-danger" id="ld-batch-delete">
                    <span>🗑️</span>
                    <span class="btn-text">删除批次</span>
                  </button>
                </div>
              </div>
              <div class="card-body">
                <div class="batch-tabs" id="ld-batch-tabs"></div>
                <div id="ld-batch-detail-section" style="display: none;">
                  <div class="form-row">
                    <div class="form-group">
                      <label>批次名称</label>
                      <input type="text" id="ld-batch-name" class="form-input" />
                    </div>
                    <div class="form-group">
                      <label>测试对象</label>
                      <select id="ld-batch-part" class="form-input">
                        <option value="product">整机</option>
                        <option value="motor">电机</option>
                        <option value="battery">电池包</option>
                        <option value="gearbox">齿轮箱/传动</option>
                        <option value="blade">刀片组件</option>
                        <option value="bearing">轴承</option>
                      </select>
                    </div>
                    <div class="form-group">
                      <label>开始日期</label>
                      <input type="date" id="ld-batch-date" class="form-input" />
                    </div>
                  </div>
                  <div class="form-row">
                    <div class="form-group full-width">
                      <label>备注</label>
                      <textarea id="ld-batch-note" class="form-input" rows="2"></textarea>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div class="card" id="ld-batch-items-section" style="display: none;">
              <div class="card-header">
                <h3>试验数据</h3>
                <div class="card-actions">
                  <button type="button" class="btn-icon" id="ld-add-item">
                    <span>➕</span>
                    <span class="btn-text">添加样本</span>
                  </button>
                </div>
              </div>
              <div class="card-body">
                <div class="table-wrap">
                  <table class="data-table">
                    <thead>
                      <tr>
                        <th style="width: 50px;">序号</th>
                        <th style="width: 120px;">时间 (h)</th>
                        <th style="width: 120px;">状态</th>
                        <th style="width: 150px;">零件</th>
                        <th style="min-width: 150px;">失效模式</th>
                        <th style="min-width: 180px;">备注</th>
                        <th style="width: 70px;">操作</th>
                      </tr>
                    </thead>
                    <tbody id="ld-items-tbody"></tbody>
                  </table>
                </div>
                <div class="empty-state" id="ld-items-empty" style="display: none;">
                  <div class="empty-icon">📊</div>
                  <h3>暂无试验数据</h3>
                  <p>点击「添加样本」按钮开始录入试验数据。</p>
                </div>
              </div>
            </div>
          </div>

          <div class="life-data-tab-content" id="life-tab-analysis" style="display: none;">
            <div class="card">
              <div class="card-header">
                <h3>分析配置</h3>
              </div>
              <div class="card-body">
                <div class="form-row">
                  <div class="form-group">
                    <label>分布类型</label>
                    <select id="ld-distribution" class="form-input">
                      <option value="weibull">Weibull 分布</option>
                      <option value="exponential">指数分布</option>
                      <option value="lognormal">对数正态分布</option>
                    </select>
                  </div>
                  <div class="form-group">
                    <label>参数估计方法</label>
                    <select id="ld-method" class="form-input">
                      <option value="rrx">RRX (X方向秩回归)</option>
                      <option value="rry">RRY (Y方向秩回归)</option>
                      <option value="mle">MLE (最大似然估计)</option>
                    </select>
                  </div>
                </div>
              </div>
            </div>

            <div class="card">
              <div class="card-header">
                <h3>拟合结果</h3>
              </div>
              <div class="card-body">
                <div class="metrics-grid" id="ld-fit-metrics">
                  <div class="metric-card">
                    <div class="metric-label">样本总数</div>
                    <div class="metric-value" id="ld-total-samples">—</div>
                  </div>
                  <div class="metric-card">
                    <div class="metric-label">失效数</div>
                    <div class="metric-value" id="ld-failure-count">—</div>
                  </div>
                  <div class="metric-card" id="ld-metric-beta">
                    <div class="metric-label">形状参数 β</div>
                    <div class="metric-value" id="ld-beta">—</div>
                  </div>
                  <div class="metric-card" id="ld-metric-eta">
                    <div class="metric-label">特征寿命 η</div>
                    <div class="metric-value" id="ld-eta">—</div>
                    <div class="metric-unit">h</div>
                  </div>
                  <div class="metric-card" id="ld-metric-lambda" style="display: none;">
                    <div class="metric-label">失效率 λ</div>
                    <div class="metric-value" id="ld-lambda">—</div>
                    <div class="metric-unit">/h</div>
                  </div>
                  <div class="metric-card" id="ld-metric-mu" style="display: none;">
                    <div class="metric-label">对数均值 μ</div>
                    <div class="metric-value" id="ld-mu">—</div>
                  </div>
                  <div class="metric-card" id="ld-metric-sigma" style="display: none;">
                    <div class="metric-label">对数标准差 σ</div>
                    <div class="metric-value" id="ld-sigma">—</div>
                  </div>
                  <div class="metric-card">
                    <div class="metric-label">B10 寿命</div>
                    <div class="metric-value" id="ld-b10">—</div>
                    <div class="metric-unit">h</div>
                  </div>
                  <div class="metric-card">
                    <div class="metric-label">B50 寿命</div>
                    <div class="metric-value" id="ld-b50">—</div>
                    <div class="metric-unit">h</div>
                  </div>
                  <div class="metric-card">
                    <div class="metric-label">拟合优度 R²</div>

              </div>

              <div class="card">
                <div class="card-header">
                  <h3>计算结果</h3>
                </div>
                <div class="card-body">
                  <div class="metrics-grid">
                    <div class="metric-card">
                      <div class="metric-label">温度范围 ΔT</div>
                      <div class="metric-value" id="env-delta-t">—</div>
                      <div class="metric-unit">°C</div>
                    </div>
                    <div class="metric-card">
                      <div class="metric-label">每循环损伤量</div>
                      <div class="metric-value" id="env-cycle-damage">—</div>
                    </div>
                    <div class="metric-card">
                      <div class="metric-label">总累积损伤</div>
                      <div class="metric-value" id="env-total-damage">—</div>
                    </div>
                    <div class="metric-card">
                      <div class="metric-label">预测寿命</div>
                      <div class="metric-value" id="env-predicted-life">—</div>
                      <div class="metric-unit">循环</div>
                    </div>
                    <div class="metric-card">
                      <div class="metric-label">等效寿命</div>
                      <div class="metric-value" id="env-equiv-life">—</div>
                      <div class="metric-unit">小时/年</div>
                    </div>
                  </div>
                  <div class="status-banner" id="env-thermal-status" style="display: none;"></div>
                </div>
              </div>
            </div>

            <div class="card">
              <div class="card-header">
                <h3>温度循环曲线</h3>
              </div>
              <div class="card-body">
                <div class="thermal-chart-container">
                  <canvas id="env-thermal-canvas" width="800" height="300"></canvas>
                </div>
                <div class="chart-legend">
                  <div class="legend-item">
                    <span class="legend-color" style="background: var(--accent);"></span>
                    <span>温度-时间曲线</span>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="env-tab-content" id="env-tab-vibration" style="display: none;">
            <div class="card-grid">
              <div class="card vibration-card">
                <div class="card-header">
                  <h3>振动类型</h3>
                </div>
                <div class="card-body">
                  <div class="vibration-type-switch">
                    <button type="button" class="vib-type-btn active" data-type="sine">正弦振动</button>
                    <button type="button" class="vib-type-btn" data-type="random">随机振动</button>
                  </div>
                </div>
              </div>
            </div>

            <div class="card-grid">
              <div class="card" id="env-sine-card">
                <div class="card-header">
                  <h3>正弦振动参数</h3>
                </div>
                <div class="card-body">
                  <form id="env-sine-form">
                    <div class="form-row">
                      <div class="form-group">
                        <label>起始频率 (Hz)</label>
                        <input type="number" name="freqStart" class="form-input" min="0.1" step="0.1" />
                      </div>
                      <div class="form-group">
                        <label>终止频率 (Hz)</label>
                        <input type="number" name="freqEnd" class="form-input" min="0.1" step="0.1" />
                      </div>
                    </div>
                    <div class="form-row">
                      <div class="form-group">
                        <label>加速度幅值 (g)</label>
                        <input type="number" name="amplitude" class="form-input" min="0.1" step="0.1" />
                      </div>
                      <div class="form-group">
                        <label>振动方向</label>
                        <select name="direction" class="form-input">
                          <option value="x">X 轴</option>
                          <option value="y">Y 轴</option>
                          <option value="z">Z 轴</option>
                        </select>
                      </div>
                    </div>
                    <div class="form-row">
                      <div class="form-group">
                        <label>持续时间 (min)</label>
                        <input type="number" name="duration" class="form-input" min="0" step="1" />
                      </div>
                    </div>
                  </form>
                </div>
              </div>

              <div class="card" id="env-random-card" style="display: none;">
                <div class="card-header">
                  <h3>随机振动参数</h3>
                </div>
                <div class="card-body">
                  <form id="env-random-form">
                    <div class="form-row">
                      <div class="form-group">
                        <label>起始频率 (Hz)</label>
                        <input type="number" name="freqStart" class="form-input" min="0.1" step="0.1" />
                      </div>
                      <div class="form-group">
                        <label>终止频率 (Hz)</label>
                        <input type="number" name="freqEnd" class="form-input" min="0.1" step="0.1" />
                      </div>
                    </div>
                    <div class="form-row">
                      <div class="form-group">
                        <label>PSD 谱密度 (g²/Hz)</label>
                        <input type="number" name="psd" class="form-input" min="0.001" step="0.001" />
                      </div>
                      <div class="form-group">
                        <label>持续时间 (min)</label>
                        <input type="number" name="duration" class="form-input" min="0" step="1" />
                      </div>
                    </div>
                  </form>
                </div>
              </div>

              <div class="card">
                <div class="card-header">
                  <h3>分析结果</h3>
                </div>
                <div class="card-body">
                  <div class="metrics-grid">
                    <div class="metric-card">
                      <div class="metric-label">Grms (随机振动)</div>
                      <div class="metric-value" id="env-grms">—</div>
                      <div class="metric-unit">g</div>
                    </div>
                    <div class="metric-card">
                      <div class="metric-label">振动应力水平</div>
                      <div class="metric-value" id="env-stress-level">—</div>
                    </div>
                    <div class="metric-card">
                      <div class="metric-label">疲劳损伤估算</div>
                      <div class="metric-value" id="env-fatigue-damage">—</div>
                    </div>
                    <div class="metric-card">
                      <div class="metric-label">建议试验等级</div>
                      <div class="metric-value" id="env-suggested-level">—</div>
                    </div>
                  </div>
                  <div class="action-row">
                    <button type="button" class="btn-primary" id="env-vib-calc">计算</button>
                    <button type="button" class="btn-ghost" id="env-vib-reset">重置</button>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="env-tab-content" id="env-tab-env-mapping" style="display: none;">
            <div class="card">
              <div class="card-header">
                <h3>环境应力映射表</h3>
                <div class="card-actions">
                  <span class="selector-label" style="font-size: 0.8rem; color: var(--text-muted);">共 <span id="env-stress-count">0</span> 种应力</span>
                </div>
              </div>
              <div class="card-body" style="padding: 0;">
                <div class="env-table-container table-wrap">
                  <table class="data-table env-stress-table">
                    <thead>
                      <tr>
                        <th style="width: 60px;">序号</th>
                        <th style="min-width: 100px;">应力类型</th>
                        <th style="min-width: 140px;">使用环境等级</th>
                        <th style="width: 100px;">环境因子 π_E</th>
                        <th style="min-width: 180px;">试验标准参考</th>
                        <th style="min-width: 180px;">备注</th>
                      </tr>
                    </thead>
                    <tbody id="env-stress-tbody"></tbody>
                  </table>
                </div>
              </div>
            </div>

            <div class="card">
              <div class="card-header">
                <h3>环境因子说明 (π_E)</h3>
              </div>
              <div class="card-body">
                <div class="env-factor-grid">
                  <div class="env-factor-item">
                    <div class="factor-name">地面良好 (Ground Benign)</div>
                    <div class="factor-value">π_E = 1.0</div>
                    <div class="factor-desc">受控环境，温度稳定，无振动</div>
                  </div>
                  <div class="env-factor-item">
                    <div class="factor-name">地面固定 (Ground Fixed)</div>
                    <div class="factor-value">π_E = 1.5</div>
                    <div class="factor-desc">固定安装，有一定温湿度变化</div>
                  </div>
                  <div class="env-factor-item">
                    <div class="factor-name">地面移动 (Ground Mobile)</div>
                    <div class="factor-value">π_E = 3.0</div>
                    <div class="factor-desc">车载设备，振动和温度变化较大</div>
                  </div>
                  <div class="env-factor-item">
                    <div class="factor-name">户外 (Outdoor)</div>
                    <div class="factor-value">π_E = 4.0</div>
                    <div class="factor-desc">直接暴露于自然环境</div>
                  </div>
                  <div class="env-factor-item">
                    <div class="factor-name">舰载 (Naval)</div>
                    <div class="factor-value">π_E = 5.0</div>
                    <div class="factor-desc">海上环境，盐雾、湿度、摇摆</div>
                  </div>
                  <div class="env-factor-item">
                    <div class="factor-name">机载 (Airborne)</div>
                    <div class="factor-value">π_E = 7.0</div>
                    <div class="factor-desc">航空环境，温度、压力、振动变化剧烈</div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="env-tab-content" id="env-tab-standards" style="display: none;">
            <div class="card">
              <div class="card-header">
                <h3>试验标准库</h3>
                <div class="card-actions">
                  <div class="standards-filter">
                    <select id="env-standard-category" class="form-input" style="width: 160px;">
                      <option value="all">全部分类</option>
                      <option value="IEC 60068">IEC 60068 系列</option>
                      <option value="GJB 150">GJB 150 系列</option>
                      <option value="MIL-STD-810">MIL-STD-810</option>
                      <option value="GB/T 2423">GB/T 2423</option>
                    </select>
                    <input type="text" id="env-standard-search" class="form-input" placeholder="搜索标准编号或名称..." style="width: 220px;" />
                  </div>
                </div>
              </div>
              <div class="card-body" style="padding: 0;">
                <div class="standards-table-container table-wrap">
                  <table class="data-table standards-table">
                    <thead>
                      <tr>
                        <th style="width: 50px;">序号</th>
                        <th style="min-width: 180px;">标准编号</th>
                        <th style="min-width: 180px;">标准名称</th>
                        <th style="width: 130px;">标准分类</th>
                        <th style="min-width: 180px;">适用范围</th>
                        <th style="min-width: 200px;">常用试验项目</th>
                      </tr>
                    </thead>
                    <tbody id="env-standards-tbody"></tbody>
                  </table>
                  <div class="empty-state" id="env-standards-empty" style="display: none;">
                    <div class="empty-icon">📋</div>
                    <h3>未找到匹配的标准</h3>
                    <p>请尝试其他搜索关键词或分类筛选。</p>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </template>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
