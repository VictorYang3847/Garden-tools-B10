name: Deploy to CloudBase

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cloudbase-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: cloudbase/functions/api/package-lock.json

      - name: Install CloudBase CLI and SDK
        run: |
          npm install -g @cloudbase/cli
          npm install @cloudbase/manager-node
          echo "### CLI Version" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tcb --version 2>&1 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Prepare deploy files
        run: |
          mkdir -p deploy
          cp index.html deploy/
          cp -r css deploy/
          cp -r js deploy/
          echo "### Deploy Files" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          find deploy -type f | wc -l >> $GITHUB_STEP_SUMMARY
          echo "files" >> $GITHUB_STEP_SUMMARY
          find deploy -type f | head -20 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Install function dependencies
        run: |
          if [ -f "cloudbase/functions/api/package.json" ]; then
            cd cloudbase/functions/api
            npm ci
            cd ../../..
          fi

      - name: Deploy to CloudBase
        env:
          TCB_ENV_ID: ${{ secrets.TCB_ENV_ID }}
          TCB_API_KEY_ID: ${{ secrets.TCB_API_KEY_ID }}
          TCB_API_KEY: ${{ secrets.TCB_API_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          set -x
          tcb login --apiKeyId "$TCB_API_KEY_ID" --apiKey "$TCB_API_KEY"

          # 部署云函数
          echo "y" | tcb fn deploy api -e "$TCB_ENV_ID" --force

          # 设置 JWT_SECRET 环境变量
          if [ -n "$JWT_SECRET" ]; then
            tcb fn config update api -e "$TCB_ENV_ID" --envVariables "{\"JWT_SECRET\":\"$JWT_SECRET\"}" 2>/dev/null \
              && echo "JWT_SECRET 已设置" \
              || echo "⚠️ 自动设置失败，请在 CloudBase 控制台手动设置 JWT_SECRET 环境变量"
          else
            echo "⚠️ 未配置 JWT_SECRET GitHub Secret，请在 CloudBase 控制台手动设置"
          fi

          # SDK 方式部署静态托管
          echo "### SDK Deploy Output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          DEPLOY_DIR=./deploy node scripts/deploy-hosting.mjs 2>&1 | tee /tmp/sdk-output.txt >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

          # CLI 方式部署到根目录
          echo "### CLI Deploy to / " >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tcb hosting deploy ./deploy / -e "$TCB_ENV_ID" 2>&1 | tee /tmp/cli-root-output.txt >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

          # CLI 方式部署到 /home
          echo "### CLI Deploy to /home" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tcb hosting deploy ./deploy /home -e "$TCB_ENV_ID" 2>&1 | tee /tmp/cli-home-output.txt >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

          # 验证部署结果
          echo "### Hosting List" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tcb hosting list -e "$TCB_ENV_ID" 2>&1 >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Deployment summary
        run: |
          echo "### Deployment Info" >> $GITHUB_STEP_SUMMARY
          echo "- 分支: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- 提交: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- 环境: \`${{ secrets.TCB_ENV_ID }}\`" >> $GITHUB_STEP_SUMMARY
