name: Deploy to CloudBase

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cloudbase-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: cloudbase/functions/api/package-lock.json

      - name: Install CloudBase CLI
        run: npm install -g @cloudbase/cli

      - name: Install function dependencies
        run: |
          if [ -f "cloudbase/functions/api/package.json" ]; then
            cd cloudbase/functions/api
            npm ci
            cd ../../..
          fi

      - name: Deploy cloud function to CloudBase
        env:
          TCB_ENV_ID: ${{ secrets.TCB_ENV_ID }}
          TCB_API_KEY_ID: ${{ secrets.TCB_API_KEY_ID }}
          TCB_API_KEY: ${{ secrets.TCB_API_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          set -x
          tcb login --apiKeyId "$TCB_API_KEY_ID" --apiKey "$TCB_API_KEY"

          # 部署云函数
          echo "y" | tcb fn deploy api -e "$TCB_ENV_ID" --force

          # 设置 JWT_SECRET 环境变量
          if [ -n "$JWT_SECRET" ]; then
            tcb fn config update api -e "$TCB_ENV_ID" --envVariables "{\"JWT_SECRET\":\"$JWT_SECRET\"}" 2>/dev/null \
              && echo "JWT_SECRET 已设置" \
              || echo "⚠️ 自动设置失败，请在 CloudBase 控制台手动设置 JWT_SECRET 环境变量"
          else
            echo "⚠️ 未配置 JWT_SECRET GitHub Secret，请在 CloudBase 控制台手动设置"
          fi

      - name: Bump cache-busting version and prepare static files
        run: |
          BUILD_VERSION="${{ github.run_number }}"
          echo "Bumping cache-busting version to: $BUILD_VERSION"

          # 准备静态文件目录
          mkdir -p deploy_tmp
          cp index.html deploy_tmp/
          cp -r css deploy_tmp/
          cp -r js deploy_tmp/

          # 更新 index.html 中的版本号
          sed -i "s/window.__APP_VERSION__ = '.*';/window.__APP_VERSION__ = '$BUILD_VERSION';/" deploy_tmp/index.html

          # 替换所有 ?v=X.Y.Z 为 ?v=BUILD_VERSION（唯一版本，避免 CDN 缓存旧文件）
          sed -i "s/?v=[^\"']*/?v=$BUILD_VERSION/g" deploy_tmp/index.html
          find deploy_tmp/js -type f -name "*.js" -exec sed -i "s/?v=[^\"']*/?v=$BUILD_VERSION/g" {} +

          # 确认替换结果
          echo "=== index.html 版本信息 ==="
          grep -E "APP_VERSION|\.js\?v=|\.css\?v=" deploy_tmp/index.html | head -5
          echo "=== JS import 版本样例 ==="
          grep -r "?v=" deploy_tmp/js/app.js deploy_tmp/js/router.js | head -3

      - name: Deploy static hosting to CloudBase
        continue-on-error: true
        env:
          TCB_ENV_ID: ${{ secrets.TCB_ENV_ID }}
        run: |
          set -x
          # 列出文件确认
          echo "=== 静态文件列表 ==="
          find deploy_tmp -type f | head -50

          # 部署静态托管（使用 --envId 参数）
          tcb hosting deploy ./deploy_tmp --envId "$TCB_ENV_ID"
          echo "静态托管部署退出码: $?"

      - name: Deployment summary
        run: |
          echo "### CloudBase 部署完成" >> $GITHUB_STEP_SUMMARY
          echo "- 分支: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- 提交: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- 环境: \`${{ secrets.TCB_ENV_ID }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 部署内容" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ 云函数 (API)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ 静态托管 (前端)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Cloudflare Pages (自动部署)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ⚠️ 安全检查" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ secrets.JWT_SECRET }}" ]; then
            echo "- ✅ JWT_SECRET 已配置" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ **JWT_SECRET 未配置** — 请在 GitHub Secrets 和 CloudBase 控制台设置" >> $GITHUB_STEP_SUMMARY
          fi
