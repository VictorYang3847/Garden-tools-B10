name: Deploy to CloudBase

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cloudbase-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: cloudbase/functions/api/package-lock.json

      - name: Install CloudBase CLI and SDK
        run: |
          npm install -g @cloudbase/cli
          npm install @cloudbase/manager-node
          tcb --version

      - name: Prepare deploy files
        run: |
          mkdir -p deploy
          cp index.html deploy/
          cp -r css deploy/
          cp -r js deploy/
          echo "=== deploy 目录内容 ==="
          find deploy -type f | head -30
          echo "..."
          find deploy -type f | wc -l
          echo "files total"

      - name: Install function dependencies
        run: |
          if [ -f "cloudbase/functions/api/package.json" ]; then
            cd cloudbase/functions/api
            npm ci
            cd ../../..
          fi

      - name: Deploy to CloudBase
        env:
          TCB_ENV_ID: ${{ secrets.TCB_ENV_ID }}
          TCB_API_KEY_ID: ${{ secrets.TCB_API_KEY_ID }}
          TCB_API_KEY: ${{ secrets.TCB_API_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          set -x
          tcb login --apiKeyId "$TCB_API_KEY_ID" --apiKey "$TCB_API_KEY"

          # 部署云函数
          echo "y" | tcb fn deploy api -e "$TCB_ENV_ID" --force

          # 设置 JWT_SECRET 环境变量
          if [ -n "$JWT_SECRET" ]; then
            tcb fn config update api -e "$TCB_ENV_ID" --envVariables "{\"JWT_SECRET\":\"$JWT_SECRET\"}" 2>/dev/null \
              && echo "JWT_SECRET 已设置" \
              || echo "⚠️ 自动设置失败，请在 CloudBase 控制台手动设置 JWT_SECRET 环境变量"
          else
            echo "⚠️ 未配置 JWT_SECRET GitHub Secret，请在 CloudBase 控制台手动设置"
          fi

          # 方法1: 使用 manager-node SDK 直接上传（更可靠）
          echo "=== 方法1: SDK 上传 ==="
          DEPLOY_DIR=./deploy node scripts/deploy-hosting.mjs 2>&1 || echo "⚠️ SDK 上传失败"

          # 方法2: 使用 CLI 部署到根目录
          echo "=== 方法2: CLI 部署到 / ==="
          tcb hosting deploy ./deploy / -e "$TCB_ENV_ID" 2>&1 || echo "⚠️ CLI 部署到 / 失败"

          # 方法3: 使用 CLI 部署到 /home
          echo "=== 方法3: CLI 部署到 /home ==="
          tcb hosting deploy ./deploy /home -e "$TCB_ENV_ID" 2>&1 || echo "⚠️ CLI 部署到 /home 失败"

          # 验证部署结果
          echo "=== 验证静态托管文件列表 ==="
          tcb hosting list -e "$TCB_ENV_ID" 2>&1 || echo "⚠️ hosting list 失败"

      - name: Deployment summary
        run: |
          echo "### CloudBase 部署完成" >> $GITHUB_STEP_SUMMARY
          echo "- 分支: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- 提交: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- 环境: \`${{ secrets.TCB_ENV_ID }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ⚠️ 安全检查" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ secrets.JWT_SECRET }}" ]; then
            echo "- ✅ JWT_SECRET 已配置" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ **JWT_SECRET 未配置** — 请在 GitHub Secrets 和 CloudBase 控制台设置" >> $GITHUB_STEP_SUMMARY
          fi
